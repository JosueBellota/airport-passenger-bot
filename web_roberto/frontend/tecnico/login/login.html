<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sistema Roberto — Login</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

  <div class="escenario">
    <div class="tarjeta">

      <!-- ENCABEZADO -->
      <div class="encabezadoTarjeta">
        <div class="decoracion1"></div>
        <div class="decoracion2"></div>
         <!-- Logo -->
        <div class="logo">
            <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#cca478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Antenna -->
                <path d="M12 7 V 4 h 2.5"></path>
                <!-- Head -->
                <rect x="5" y="7" width="14" height="11" rx="2.5"></rect>
                <!-- Eyes -->
                <line x1="9" y1="10.5" x2="9" y2="13.5"></line>
                <line x1="15" y1="10.5" x2="15" y2="13.5"></line>
                <!-- Ears -->
                <line x1="2" y1="12.5" x2="5" y2="12.5"></line>
                <line x1="19" y1="12.5" x2="22" y2="12.5"></line>
            </svg>
        </div>
        <div class="titulo">Sistema Roberto</div>
        <div class="subtitulo">Control de Flota Aeroportuaria</div>
      </div>

      <!-- CUERPO -->
      <div class="cuerpoTarjeta">

        <div class="tarjetaFormulario">
          <div class="tituloSeccion">Ingreso de Operador</div>

          <form id="formularioIngreso">

            <!-- CAMPO CORREO -->
            <div class="filaFormulario">
              <label class="etiqueta" for="correoElectronico">Correo Electronico</label>
              <div class="contenedorInput" id="contenedorCorreo">
                <div class="iconoBurbuja">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                    <rect x="3" y="6" width="18" height="12" rx="2.5" stroke="currentColor" stroke-width="1.4"
                      stroke-linecap="round" />
                    <path d="M3 7l9 6 9-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                  </svg>
                </div>
                <input id="correoElectronico" name="correoElectronico" type="text"
                  placeholder="operador@aeropuerto.com" autocomplete="username" />
              </div>
              <div class="error-msg" id="mensajeErrorCorreo"></div>
            </div>

            <!-- CAMPO CONTRASEÑA -->
            <div class="filaFormulario">
              <label class="etiqueta" for="contrasena">Contrasena</label>
              <div class="contenedorInput" id="contenedorContrasena">
                <div class="iconoBurbuja">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                    <rect x="3.5" y="11.5" width="17" height="8.5" rx="2.2" stroke="currentColor" stroke-width="1.4" />
                    <path d="M7 11.5V9a5 5 0 0 1 10 0v2.5" stroke="currentColor" stroke-width="1.4"
                      stroke-linecap="round" />
                  </svg>
                </div>
                <input id="contrasena" name="contrasena" type="password" placeholder="••••••••"
                  autocomplete="current-password" />
                <div class="accionesInput">
                  <button type="button" class="botonIcono" id="alternarContrasena" title="Mostrar contrasena">
                    <svg id="ojoIcono" viewBox="0 0 24 24" width="18" height="18" fill="none">
                      <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor"
                        stroke-width="1.4" />
                      <circle cx="12" cy="12" r="2.4" stroke="currentColor" stroke-width="1.4" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="error-msg" id="mensajeErrorContrasena"></div>
            </div>

            <!-- CHECKBOX -->
            <div class="filaEntre">
              <label class="recordar">
                <input id="recordarme" type="checkbox" />
                Recordarme
              </label>
              <a href="#" class="olvidaste" id="enlaceOlvidaste">¿Olvidó su contraseña?</a>
            </div>

            <!-- BOTÓN DE ENVÍO -->
            <button class="boton" id="botonIngreso" type="submit">Entrar al sistema</button>
          </form>

          <!-- NOTA INFERIOR -->
          <div class="nota">¿Necesitas ayuda? Contacta con soporte técnico.</div>
        </div>
      </div>
    </div>
  </div>

<script src="form.js"></script>
</body>
</html>
