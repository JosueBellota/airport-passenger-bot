<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBERTO - Quiosco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Botón Técnico Oculto -->
    <button id="tech-btn" aria-label="Acceso Técnico" title="Acceso Técnico">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <main class="container">
        <!-- Logo -->
        <div class="logo">
            <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#cca478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Antenna -->
                <path d="M12 7 V 4 h 2.5"></path>
                <!-- Head -->
                <rect x="5" y="7" width="14" height="11" rx="2.5"></rect>
                <!-- Eyes -->
                <line x1="9" y1="10.5" x2="9" y2="13.5"></line>
                <line x1="15" y1="10.5" x2="15" y2="13.5"></line>
                <!-- Ears -->
                <line x1="2" y1="12.5" x2="5" y2="12.5"></line>
                <line x1="19" y1="12.5" x2="22" y2="12.5"></line>
            </svg>
        </div>

        <h1 id="title">ROBERTO</h1>
        <h2 id="subtitle">Robot guía y transporte de equipaje</h2>

        <div class="welcome-pill">
            <span id="welcome">Bienvenido al sistema de transporte automático</span>
        </div>

        <div class="language-section">
            <div class="language-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <span id="select-lang">Selecciona tu idioma</span>
            </div>
            
            <div class="language-buttons">
                <button class="lang-btn active" data-lang="es">
                    <img src="https://flagcdn.com/w40/es.png" srcset="https://flagcdn.com/w80/es.png 2x" width="28" alt="Español" class="flag" style="border-radius: 2px;">
                    <span class="lang-name">Español</span>
                </button>
                <button class="lang-btn" data-lang="en">
                    <img src="https://flagcdn.com/w40/gb.png" srcset="https://flagcdn.com/w80/gb.png 2x" width="28" alt="English" class="flag" style="border-radius: 2px;">
                    <span class="lang-name">English</span>
                </button>
                <button class="lang-btn" data-lang="de">
                    <img src="https://flagcdn.com/w40/de.png" srcset="https://flagcdn.com/w80/de.png 2x" width="28" alt="Deutsch" class="flag" style="border-radius: 2px;">
                    <span class="lang-name">Deutsch</span>
                </button>
                <button class="lang-btn" data-lang="fr">
                    <img src="https://flagcdn.com/w40/fr.png" srcset="https://flagcdn.com/w80/fr.png 2x" width="28" alt="Français" class="flag" style="border-radius: 2px;">
                    <span class="lang-name">Français</span>
                </button>
            </div>
        </div>

        <button id="start-btn">Comenzar</button>
    </main>

    <script src="main.js"></script>
</body>
</html>
